services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rustuary
      POSTGRES_PASSWORD: rustuary
      POSTGRES_DB: rustuary
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rustuary
      MINIO_ROOT_PASSWORD: rustuary123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  nats:
    image: nats:2
    ports:
      - "4222:4222"

volumes:
  postgres-data:
  minio-data:
