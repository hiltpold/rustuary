name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check_repo_hygiene.sh

  rust-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.78.0
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  go-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"
      - run: test -z "$(cd services/api && gofmt -l .)"
      - run: cd services/api && go test ./...
      - run: cd services/api && go vet ./...
      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: cd services/api && golangci-lint run
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: cd services/api && govulncheck ./...

  workbench-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: cd apps/workbench && pnpm check
      - run: cd apps/workbench && pnpm lint
